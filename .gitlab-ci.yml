include:
  - template: Jobs/SAST.gitlab-ci.yml
  - component: $CI_SERVER_FQDN/components/code-quality-oss/codequality-os-scanners-integration/codequality-oss@1.1.4
  - component: $CI_SERVER_FQDN/components/code-intelligence/golang-code-intel@v0.3.1
  - component: $CI_SERVER_FQDN/components/code-intelligence/typescript-code-intel@v0.3.1
    inputs:
      node_version: "22.23.1"
  - component: $CI_SERVER_FQDN/components/secret-detection/secret-detection@2.1.0

variables:
  GITLAB_ADVANCED_SAST_ENABLED: 'true'
  ADVANCED_SAST_PARTIAL_SCAN: 'differential'
  GO_VERSION: "1.26.5"
  GO_LINUX_AMD64_SHA256: "5c2c3b16caefa1d968a94c1daca04a7ca301a496d9b086e17ad77bb81393f053"
  NODE_VERSION: "22.23.1"
  PNPM_VERSION: "10.28.0"
  PLAYWRIGHT_VERSION: "1.60.0"
  TASK_VERSION: "3.51.1"
  GOLANGCI_LINT_VERSION: "2.12.2"
  GORELEASER_VERSION: "2.17.0"
  # Keep mutable tags readable while binding execution to immutable manifests.
  GO_IMAGE: "golang:1.26.5-bookworm@sha256:1ecb7edf62a0408027bd5729dfd6b1b8766e578e8df93995b225dfd0944eb651"
  NODE_IMAGE: "node:22.23.1-bookworm@sha256:5647be709086c696ff32edaaf1c70cd26d1da6ab2b39c32f3c7b4c4a31957e37"
  PLAYWRIGHT_IMAGE: "mcr.microsoft.com/playwright:v1.60.0-noble@sha256:9bd26ad900bb5e0f4dee75839e957a89ae89c2b7ab1e76050e559790e946b948"
  PYTHON_IMAGE: "python:3.11.15-bookworm@sha256:5c34b355088846dddc8afb7442c20b9433dccdc8d66192dc52c616adeaa106a3"
  DOCKER_CLI_IMAGE: "docker:29.6.2-cli@sha256:be132a9f282288de4afaf63379dff75711fda0147c6b72a9df44e51841402144"
  DOCKER_DIND_IMAGE: "docker:29.6.2-dind@sha256:bfec1f5159c63a81ca6fdedbd81404d2c0e16378ed0feec3bb3fbf3998847659"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  # Registry configuration - adjust as needed
  CI_REGISTRY_IMAGE: $CI_REGISTRY/$CI_PROJECT_PATH

stages:
  - test
  - build-binaries
  - build-docker
  - release

# ==========================================
# Test Jobs
# ==========================================

# Backend Tests (Go)
test:backend:
  stage: test
  image: "$GO_IMAGE"
  cache:
    key:
      files:
        - backend/go.sum
    paths:
      - backend/.go-pkg-cache/
    policy: pull-push
  before_script:
    - export GOMODCACHE="$CI_PROJECT_DIR/backend/.go-pkg-cache"
    - GOBIN=/usr/local/bin go install "github.com/go-task/task/v3/cmd/task@v${TASK_VERSION}"
    - GOBIN=/usr/local/bin go install "github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v${GOLANGCI_LINT_VERSION}"
  script:
    - cd backend
    - task go:lint
    - task go:build
    - task go:coverage
  coverage: '/coverage: \d+.\d+% of statements/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.out
    paths:
      - backend/coverage.out
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Frontend Lint and Typecheck
test:frontend:lint:
  stage: test
  image: "$NODE_IMAGE"
  cache:
    key:
      files:
        - frontend/pnpm-lock.yaml
    paths:
      - frontend/node_modules/
      - .pnpm-store/
    policy: pull-push
  before_script:
    - corepack enable
    - corepack prepare "pnpm@${PNPM_VERSION}" --activate
    - pnpm config set store-dir "$CI_PROJECT_DIR/.pnpm-store"
  script:
    - cd frontend
    - pnpm install --frozen-lockfile
    - pnpm run lint:ci
    - pnpm run typecheck
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Frontend Integration Tests (SQLite)
test:frontend:integration:
  stage: test
  image: "$NODE_IMAGE"
  cache:
    - key:
        files:
          - frontend/pnpm-lock.yaml
      paths:
        - frontend/node_modules/
        - .pnpm-store/
      policy: pull-push
    - key:
        files:
          - backend/go.sum
      paths:
        - backend/.go-pkg-cache/
      policy: pull-push
  before_script:
    - corepack enable
    - corepack prepare "pnpm@${PNPM_VERSION}" --activate
    - pnpm config set store-dir "$CI_PROJECT_DIR/.pnpm-store"
    - curl --fail --location --silent --show-error --output /tmp/go.tar.gz "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz"
    - 'echo "${GO_LINUX_AMD64_SHA256}  /tmp/go.tar.gz" | sha256sum --check -'
    - tar -C /usr/local -xzf /tmp/go.tar.gz
    - export PATH="/usr/local/go/bin:${PATH}"
    - export GOMODCACHE="$CI_PROJECT_DIR/backend/.go-pkg-cache"
    - GOBIN=/usr/local/bin go install "github.com/go-task/task/v3/cmd/task@v${TASK_VERSION}"
  script:
    - cd frontend
    - pnpm install --frozen-lockfile
    - cd ..
    - task test:ci
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Frontend Integration Tests (PostgreSQL Matrix)
test:frontend:integration:postgresql:
  stage: test
  image: "$NODE_IMAGE"
  services:
    - name: "$POSTGRES_IMAGE"
      alias: postgres
  variables:
    POSTGRES_USER: homebox
    POSTGRES_PASSWORD: homebox
    POSTGRES_DB: homebox
    POSTGRES_HOST_AUTH_METHOD: trust
  parallel:
    matrix:
      - POSTGRES_VERSION: ["17.10"]
        POSTGRES_IMAGE: ["postgres:17.10-bookworm@sha256:4f736ae292687621d4dbe0d499ffd024a36bd2ee7d8ca6f2ccd4c800f047b394"]
      - POSTGRES_VERSION: ["16.14"]
        POSTGRES_IMAGE: ["postgres:16.14-bookworm@sha256:92620daddcd947f8d5ab5ba66e848702fe443d87fed30c4cea8e389fd78dfc55"]
      - POSTGRES_VERSION: ["15.18"]
        POSTGRES_IMAGE: ["postgres:15.18-bookworm@sha256:b0c5bab0fbba8e0c221f73b1dc6359ec35f8650074377e727299df248fc8ad51"]
  cache:
    - key:
        files:
          - frontend/pnpm-lock.yaml
      paths:
        - frontend/node_modules/
        - .pnpm-store/
      policy: pull-push
    - key:
        files:
          - backend/go.sum
      paths:
        - backend/.go-pkg-cache/
      policy: pull-push
  before_script:
    - corepack enable
    - corepack prepare "pnpm@${PNPM_VERSION}" --activate
    - pnpm config set store-dir "$CI_PROJECT_DIR/.pnpm-store"
    - curl --fail --location --silent --show-error --output /tmp/go.tar.gz "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz"
    - 'echo "${GO_LINUX_AMD64_SHA256}  /tmp/go.tar.gz" | sha256sum --check -'
    - tar -C /usr/local -xzf /tmp/go.tar.gz
    - export PATH="/usr/local/go/bin:${PATH}"
    - export GOMODCACHE="$CI_PROJECT_DIR/backend/.go-pkg-cache"
    - GOBIN=/usr/local/bin go install "github.com/go-task/task/v3/cmd/task@v${TASK_VERSION}"
  script:
    - cd frontend
    - pnpm install --frozen-lockfile
    - cd ..
    - task test:ci:postgresql
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# E2E Tests (Playwright) - Sharded
test:e2e:playwright:
  stage: test
  image: "$PLAYWRIGHT_IMAGE"
  timeout: 1h
  parallel:
    matrix:
      - SHARD_INDEX: ["1", "2", "3", "4"]
        SHARD_TOTAL: "4"
  cache:
    - key:
        files:
          - frontend/pnpm-lock.yaml
      paths:
        - frontend/node_modules/
        - .pnpm-store/
      policy: pull-push
    - key:
        files:
          - backend/go.sum
      paths:
        - backend/.go-pkg-cache/
      policy: pull-push
  before_script:
    - corepack enable
    - corepack prepare "pnpm@${PNPM_VERSION}" --activate
    - pnpm config set store-dir "$CI_PROJECT_DIR/.pnpm-store"
    - curl --fail --location --silent --show-error --output /tmp/go.tar.gz "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz"
    - 'echo "${GO_LINUX_AMD64_SHA256}  /tmp/go.tar.gz" | sha256sum --check -'
    - tar -C /usr/local -xzf /tmp/go.tar.gz
    - export PATH="/usr/local/go/bin:${PATH}"
    - export GOMODCACHE="$CI_PROJECT_DIR/backend/.go-pkg-cache"
    - GOBIN=/usr/local/bin go install "github.com/go-task/task/v3/cmd/task@v${TASK_VERSION}"
  script:
    - cd frontend
    - pnpm install --frozen-lockfile
    - cd ..
    - cd backend && go mod download
    - task test:e2e -- --shard=$SHARD_INDEX/$SHARD_TOTAL
  artifacts:
    when: always
    paths:
      - frontend/blob-report/
    expire_in: 2 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# E2E Reports Merge
test:e2e:merge-reports:
  stage: test
  image: "$NODE_IMAGE"
  needs:
    - test:e2e:playwright
  cache:
    key:
      files:
        - frontend/pnpm-lock.yaml
    paths:
      - frontend/node_modules/
      - .pnpm-store/
    policy: pull
  before_script:
    - corepack enable
    - corepack prepare "pnpm@${PNPM_VERSION}" --activate
    - pnpm config set store-dir "$CI_PROJECT_DIR/.pnpm-store"
  script:
    - cd frontend
    - pnpm install --frozen-lockfile
    # Download all blob reports
    - mkdir -p all-blob-reports
    # GitLab automatically downloads artifacts from dependencies
    - cp -r ../frontend/blob-report/* all-blob-reports/ || true
    - pnpm exec playwright merge-reports --reporter html,github ./all-blob-reports || true
  artifacts:
    when: always
    paths:
      - frontend/playwright-report/
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always

# Update Currencies (Scheduled Job)
update:currencies:
  stage: test
  image: "$PYTHON_IMAGE"
  cache:
    key: python-currencies
    paths:
      - .pip-cache/
  before_script:
    - pip install --cache-dir .pip-cache -r .github/workflows/update-currencies/requirements.txt
  script:
    - python .github/scripts/update_currencies.py
    - |
      if git diff --quiet -- backend/internal/core/currencies/currencies.json; then
        echo "✅ currencies.json is already up-to-date"
        exit 0
      else
        echo "Changes detected in currencies.json"
        git config user.name "GitLab CI"
        git config user.email "ci@gitlab.com"
        git checkout -b update-currencies-$CI_COMMIT_SHORT_SHA
        git add backend/internal/core/currencies/currencies.json
        git commit -m "chore: update currencies.json"
        git push -o merge_request.create -o merge_request.target=$CI_DEFAULT_BRANCH -o merge_request.title="Update currencies.json" origin update-currencies-$CI_COMMIT_SHORT_SHA
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $UPDATE_CURRENCIES == "true"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $UPDATE_CURRENCIES == "true"

# ==========================================
# Binary Build with GoReleaser
# ==========================================
build:binaries:
  stage: build-binaries
  image: "$NODE_IMAGE"
  cache:
    - key:
        files:
          - frontend/pnpm-lock.yaml
      paths:
        - frontend/node_modules/
        - .pnpm-store/
      policy: pull-push
    - key:
        files:
          - backend/go.sum
      paths:
        - backend/.go-pkg-cache/
      policy: pull-push
  before_script:
    - corepack enable
    - corepack prepare "pnpm@${PNPM_VERSION}" --activate
    - pnpm config set store-dir "$CI_PROJECT_DIR/.pnpm-store"
    - curl --fail --location --silent --show-error --output /tmp/go.tar.gz "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz"
    - 'echo "${GO_LINUX_AMD64_SHA256}  /tmp/go.tar.gz" | sha256sum --check -'
    - tar -C /usr/local -xzf /tmp/go.tar.gz
    - export PATH="/usr/local/go/bin:${PATH}"
    - export GOMODCACHE="$CI_PROJECT_DIR/backend/.go-pkg-cache"
    - GOBIN=/usr/local/bin go install "github.com/goreleaser/goreleaser/v2@v${GORELEASER_VERSION}"
    - goreleaser --version
  script:
    # Build frontend
    - cd frontend
    - pnpm install --frozen-lockfile
    - pnpm run build
    - cp -r ./.output/public ../backend/app/api/static/
    - cd ..
    # Run GoReleaser
    - cd backend
    - goreleaser check
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        echo "Building release for tag: $CI_COMMIT_TAG"
        goreleaser release --clean --skip=publish
      else
        echo "Building snapshot"
        goreleaser release --clean --snapshot --skip=publish
      fi
  artifacts:
    name: "homebox-binaries-$CI_COMMIT_REF_SLUG"
    paths:
      - backend/dist/
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ==========================================
# Docker Build Jobs - Regular
# ==========================================
.docker_build_template:
  stage: build-docker
  image: "$DOCKER_CLI_IMAGE"
  services:
    - name: "$DOCKER_DIND_IMAGE"
      alias: docker
  before_script:
    - |
      if [ "$CI_PIPELINE_SOURCE" != "merge_request_event" ]; then
        printf '%s' "$CI_REGISTRY_PASSWORD" |
          docker login --username "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
      fi
  variables:
    DOCKER_BUILDKIT: 1
    DOCKERFILE: Dockerfile
    IMAGE_SUFFIX: ""
  script:
    - export VERSION=${CI_COMMIT_TAG:-$CI_COMMIT_REF_NAME}
    - export COMMIT=$CI_COMMIT_SHA
    - export BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
    - export CACHE_TAG=${IMAGE_SUFFIX:-regular}
    # Merge requests build to a local OCI archive without registry credentials
    # or registry cache writes. Trusted branch/tag pipelines retain publishing.
    - |
      set -eu
      BUILDER_NAME="builder-${CI_JOB_ID}"
      trap 'docker buildx rm "$BUILDER_NAME" >/dev/null 2>&1 || true' EXIT
      docker buildx create --use --name "$BUILDER_NAME"

      if [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ]; then
        docker buildx build \
          --platform "$PLATFORM" \
          --build-arg "VERSION=$VERSION" \
          --build-arg "COMMIT=$COMMIT" \
          --build-arg "BUILD_TIME=$BUILD_TIME" \
          --file "./$DOCKERFILE" \
          --tag "homebox-ci:${CI_JOB_ID}-${PLATFORM_PAIR}" \
          --output "type=oci,dest=/tmp/homebox-${PLATFORM_PAIR}.tar" \
          .
      else
        docker buildx build \
          --platform "$PLATFORM" \
          --build-arg "VERSION=$VERSION" \
          --build-arg "COMMIT=$COMMIT" \
          --build-arg "BUILD_TIME=$BUILD_TIME" \
          --cache-from "type=registry,ref=$CI_REGISTRY_IMAGE/cache:${PLATFORM_PAIR}-${CACHE_TAG}-$CI_COMMIT_REF_SLUG" \
          --cache-from "type=registry,ref=$CI_REGISTRY_IMAGE/cache:${PLATFORM_PAIR}-${CACHE_TAG}-$CI_DEFAULT_BRANCH" \
          --cache-to "type=registry,ref=$CI_REGISTRY_IMAGE/cache:${PLATFORM_PAIR}-${CACHE_TAG}-$CI_COMMIT_REF_SLUG,mode=max" \
          --file "./$DOCKERFILE" \
          --tag "$CI_REGISTRY_IMAGE${IMAGE_SUFFIX}:${CI_COMMIT_REF_SLUG}-${PLATFORM_PAIR}" \
          --push \
          .
      fi
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

