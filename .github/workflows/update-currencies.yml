name: Update Currencies

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: update-currencies-${{ github.repository }}
  cancel-in-progress: true

jobs:
  update-currencies:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.14.6"

      - name: Test currency update script
        run: python -m unittest discover -s .github/scripts -p "test_update_currencies.py"

      - name: Run currency update script
        run: python .github/scripts/update_currencies.py

      - name: Check for currencies.json changes
        id: currency-changes
        run: |
          if git diff --quiet -- backend/internal/core/currencies/currencies.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.currency-changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          token: ${{ github.token }}
          branch: update-currencies
          base: ${{ github.event.repository.default_branch }}
          title: "Update currencies.json"
          commit-message: "chore: update currencies.json"
          delete-branch: true
          path: .
          add-paths: |
            backend/internal/core/currencies/currencies.json

      - name: No updates needed
        if: steps.currency-changes.outputs.changed == 'false'
        run: echo "✅ currencies.json is already up-to-date"
